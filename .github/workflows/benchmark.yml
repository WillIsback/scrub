name: Benchmark (nightly)

on:
  schedule:
    # Run daily at 03:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch:
    # Allow manual trigger
    inputs:
      reason:
        description: 'Why run the benchmark?'
        required: false

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1

      - name: Set up Python with venv
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5
        with:
          python-version: '3.12'

      - name: Download Samsung/CredData dataset
        run: ./scripts/setup-bench-data.sh
        timeout-minutes: 20

      - name: Build confusion binary (release)
        run: cargo build --release --bin cav-bench-confusion

      - name: Run confusion matrix benchmark
        run: cargo run --release --bin cav-bench-confusion
        timeout-minutes: 15

      - name: Publish results to job summary
        run: |
          PREC=$(jq '.metrics.precision * 100 | floor / 100' bench-results/latest.json)
          REC=$(jq '.metrics.recall * 100 | floor / 100' bench-results/latest.json)
          F1=$(jq '.metrics.f1' bench-results/latest.json)
          ACC=$(jq '.metrics.accuracy * 100 | floor / 100' bench-results/latest.json)
          DS=$(jq -r '.dataset' bench-results/latest.json)
          RL=$(jq -r '.rules_loaded' bench-results/latest.json)
          VER=$(jq -r '.version' bench-results/latest.json)
          cat >> "$GITHUB_STEP_SUMMARY" <<-EOF
          ## 📊 caviarder Benchmark Results

          | Metric | Value | Baseline (gitleaks) |
          |--------|-------|---------------------|
          | Precision | **${PREC}%** | 52.6% |
          | Recall | **${REC}%** | 24.4% |
          | F1 | **${F1}** | 0.334 |
          | Accuracy | **${ACC}%** | — |

          **Dataset:** ${DS}  
          **Rules loaded:** ${RL}  
          **Version:** ${VER}
          EOF

      - name: Print raw JSON to log
        run: cat bench-results/latest.json

      - name: Archive structured results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: bench-results-${{ github.sha }}
          path: bench-results/
          retention-days: 90
