name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
      - run: cargo test

      - name: Clippy (non-bloquant)
        continue-on-error: true
        run: cargo clippy --all-targets --no-deps

      - name: Format (non-bloquant)
        continue-on-error: true
        run: cargo fmt --check

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1

      - name: Build release binary
        run: cargo build --release

      - name: Upload binary as artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cav-${{ github.ref_name }}-x86_64-unknown-linux-gnu
          path: target/release/cav

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          name: ${{ github.ref_name }}
          files: target/release/cav

  publish-crates-io:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1

      - name: Validate tag matches Cargo.toml version
        run: |
          TAG_VER="${GITHUB_REF_NAME#v}"
          TOML_VER="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml)"
          LOCK_VER="$(sed -n '/^name = "caviarder"/{n;s/^version = "\(.*\)"/\1/p}' Cargo.lock)"
          echo "Tag: v$TAG_VER  Cargo.toml: $TOML_VER  Cargo.lock: $LOCK_VER"
          if [ "$TAG_VER" != "$TOML_VER" ]; then
            echo "FATAL: tag v$TAG_VER != Cargo.toml $TOML_VER"
            exit 1
          fi
          if [ "$TAG_VER" != "$LOCK_VER" ]; then
            echo "FATAL: tag v$TAG_VER != Cargo.lock $LOCK_VER"
            exit 1
          fi

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "CRATES_IO_TOKEN secret not set — skipping crates.io publish"
            exit 0
          fi
          cargo publish
